vol_target_trend:
  type: vol_target_trend
  rebalance_frequency: daily
  signal_asset: QQQ
  ma_window: 200
  vol_window: 20
  low_vol_threshold: 0.18
  high_vol_threshold: 0.28
  asset_1x: QQQ
  asset_2x: QQQ_2X
  asset_3x: QQQ_3X
  risk_off_asset: SHY

core_trend_2x:
  type: core_trend_2x
  rebalance_frequency: daily
  signal_asset: QQQ
  fast_window: 50
  slow_window: 200
  core_asset: QQQ
  core_weight: 0.5
  tactical_weight: 0.5
  asset_2x: QQQ_2X
  asset_3x: QQQ_3X
  risk_off_asset: SHY

momentum_rotation_2x:
  type: momentum_rotation_2x
  rebalance_frequency: daily
  assets:
    - QQQ
    - SPY
    - XLK
    - SMH
    - GLD
    - SHY
  leveraged_assets:
    QQQ: QQQ_2X
    SPY: SPY_2X
    XLK: XLK_2X
    SMH: SMH_2X
  lookback_months: 6
  top_n: 2
  ma_window: 200
  fallback_asset: SHY

