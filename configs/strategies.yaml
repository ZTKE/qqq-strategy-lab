qqq_buy_hold:
  type: buy_and_hold
  weights:
    QQQ: 1.0

real_tqqq_buy_hold_2010:
  type: buy_and_hold
  weights:
    TQQQ: 1.0

tqqq_synthetic_buy_hold:
  type: buy_and_hold
  weights:
    QQQ_3X: 1.0

qqq_80_spy_20:
  type: static_allocation
  weights:
    QQQ: 0.8
    SPY: 0.2

# Disabled as redundant with qqq_80_spy_20 plus defensive trend strategies.
