  type: breakout_3x_with_stop
  rebalance_frequency: daily
  signal_asset: QQQ
  high_window: 252
  near_high_threshold: 0.95
  fast_window: 50
  slow_window: 200
  asset_1x: QQQ
  asset_2x: QQQ_2X
  asset_3x: QQQ_3X
  risk_off_asset: SHY

